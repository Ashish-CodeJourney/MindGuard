name: CI/CD

on:
  push:
    branches: [main, develop]
    tags: ['v*']
    paths-ignore:
      - 'docs/**'
      - 'README.md'
  pull_request:
    branches: [main, develop]
    paths-ignore:
      - 'docs/**'
      - 'README.md'

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Write local.properties
        run: echo "sdk.dir=$ANDROID_HOME" >> local.properties

      - name: Grant execute permission to gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew clean build --build-cache

      - name: Run tests
        run: ./gradlew :shared:testDebugUnitTest --build-cache

      - name: Build APK
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: mindguard-debug-apk
          path: androidApp/build/outputs/apk/debug/*.apk

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: '**/build/test-results/**/*.xml'

  coverage:
    name: Test Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Write local.properties
        run: echo "sdk.dir=$ANDROID_HOME" >> local.properties

      - name: Grant execute permission to gradlew
        run: chmod +x gradlew

      - name: Run shared module tests
        run: ./gradlew :shared:testDebugUnitTest --build-cache

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          fail_ci_if_error: false
          verbose: true

  lint:
    name: Code Quality
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission to gradlew
        run: chmod +x gradlew

      - name: Run ktlint
        run: ./gradlew ktlint || true

  security:
    name: Security Checks
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'table'
          exit-code: '0'

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: [build, coverage, lint]
    if: startsWith(github.ref, 'refs/tags/v')
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Write local.properties
        run: echo "sdk.dir=$ANDROID_HOME" >> local.properties

      - name: Grant execute permission to gradlew
        run: chmod +x gradlew

      - name: Decode signing keystore
        run: echo "${{ secrets.RELEASE_KEYSTORE_BASE64 }}" | base64 -d > androidApp/mindguard.jks

      - name: Write keystore.properties
        run: |
          cat > keystore.properties <<EOF
          storeFile=../androidApp/mindguard.jks
          storePassword=${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          keyAlias=${{ secrets.RELEASE_KEY_ALIAS }}
          keyPassword=${{ secrets.RELEASE_KEY_PASSWORD }}
          EOF

      - name: Build signed release APK
        run: ./gradlew assembleRelease

      - name: Verify APK signature
        run: |
          BUILD_TOOLS_DIR=$(ls -d "$ANDROID_HOME"/build-tools/*/ | sort -V | tail -1)
          "${BUILD_TOOLS_DIR}apksigner" verify --verbose androidApp/build/outputs/apk/release/*.apk

      - name: Rename APK for release
        run: |
          mkdir -p release-assets
          cp androidApp/build/outputs/apk/release/*.apk "release-assets/MindGuard-${GITHUB_REF_NAME}.apk"

      - name: Upload release APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: mindguard-release-apk
          path: release-assets/*.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
